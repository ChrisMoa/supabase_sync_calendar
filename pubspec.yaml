name: supabase_sync_calendar
description: A calendar app with Supabase backend integration
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.4
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  uuid: ^4.5.1
  intl: ^0.18.1
  syncfusion_flutter_calendar: ^29.1.39
  dio: ^5.8.0+1
  icalendar_parser: ^2.1.0
  device_calendar: ^4.3.3
  file_picker: ^10.1.2
  flutter_file_dialog: ^3.0.2
  flutter_sharing_intent: ^1.1.1
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Resolving dependency conflicts
dependency_overrides:
  timezone: ^0.10.0

flutter_icons:
  android: true
  ios: true
  linux: true
  windows:
    generate: true
    image_path: "assets/app_logo.png"
    icon_size: 48 # min:48, max:256, default: 48
  image_path: "assets/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
