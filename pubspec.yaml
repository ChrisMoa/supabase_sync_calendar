name: supabase_sync_calendar
description: A calendar app with Supabase backend integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.4
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  uuid: ^4.5.1
  intl: ^0.20.2
  syncfusion_flutter_calendar: ^29.1.38
  draggable_calendar: 
    path: ../dragable_calendar_entry

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true